<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Muhammed PP | Futuristic Portfolio Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      background: #0a0c10;
      color: #e0e0ff;
      overflow-x: hidden;
      cursor: none;
      scroll-behavior: smooth;
      background: radial-gradient(circle at 20% 20%, #121828, #03050a);
      min-height: 100vh;
    }

    /* Custom cursor & trail */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      background: rgba(0, 255, 255, 0.6);
      border-radius: 50%;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 10000;
      transition: transform 0.1s ease, background 0.2s;
      box-shadow: 0 0 20px cyan, 0 0 40px #7b2ff7;
      left: -100px;
      top: -100px;
    }

    .cursor-glow {
      position: fixed;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, rgba(0, 180, 255, 0.5) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      left: -100px;
      top: -100px;
    }

    .trail {
      position: fixed;
      width: 8px;
      height: 8px;
      background: cyan;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.6;
      box-shadow: 0 0 15px #a259ff;
      left: -100px;
      top: -100px;
      transition: opacity 0.2s;
    }

    /* Glassmorphism panels */
    .glass {
      background: rgba(18, 25, 45, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 20px 40px rgba(0, 180, 255, 0.15);
      border-radius: 2rem;
    }

    .glass-card {
      background: rgba(18, 25, 45, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 15px 35px rgba(0, 180, 255, 0.2);
      border-radius: 1.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(0, 255, 255, 0.3);
    }

    /* Loading screen */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #02040c;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 20000;
      transition: opacity 0.8s ease, visibility 0.8s;
      backdrop-filter: blur(20px);
    }
    .loader {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(0,255,255,0.3);
      border-top: 3px solid cyan;
      border-radius: 50%;
      animation: spin 1s infinite linear;
      box-shadow: 0 0 30px #a259ff;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1a; }
    ::-webkit-scrollbar-thumb { background: cyan; border-radius: 10px; }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    h1, h2, h3, h4 {
      background: linear-gradient(135deg, cyan, #a259ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    button, .btn {
      background: rgba(0, 255, 255, 0.08);
      border: 1px solid cyan;
      color: cyan;
      padding: 0.7rem 1.8rem;
      border-radius: 3rem;
      font-weight: bold;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      cursor: none;
      letter-spacing: 0.5px;
    }
    button:hover, .btn:hover {
      background: cyan;
      color: #000;
      box-shadow: 0 0 30px cyan;
    }

    input, textarea, select {
      background: rgba(10, 20, 35, 0.7);
      border: 1px solid #4b3f72;
      border-radius: 2rem;
      padding: 0.8rem 1.2rem;
      color: white;
      backdrop-filter: blur(12px);
      outline: none;
      transition: 0.3s;
      width: 100%;
      margin: 0.5rem 0;
    }
    input:focus, textarea:focus, select:focus {
      border-color: cyan;
      box-shadow: 0 0 20px cyan;
    }

    .grid {
      display: grid;
      gap: 1.8rem;
    }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }

    .badge {
      background: rgba(0, 255, 255, 0.15);
      border: 1px solid cyan;
      color: cyan;
      padding: 0.3rem 0.8rem;
      border-radius: 1rem;
      font-size: 0.8rem;
    }

    .star-rating {
      color: gold;
      font-size: 1.5rem;
    }

    .fade-in {
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-message {
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid red;
      color: #ff6b6b;
      padding: 1rem;
      border-radius: 1rem;
      margin: 1rem 0;
    }

    .success-message {
      background: rgba(0, 255, 0, 0.2);
      border: 1px solid green;
      color: #4eff4e;
      padding: 1rem;
      border-radius: 1rem;
      margin: 1rem 0;
    }

    .login-title {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .login-subtitle {
      color: #aaa;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .toggle-link {
      color: cyan;
      cursor: pointer;
      text-decoration: underline;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: inline-block;
    }

    .toggle-link:hover {
      color: #a259ff;
    }

    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .login-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <div class="loader"></div>
    <p style="color: cyan; margin-top: 1rem;">Initializing Platform...</p>
  </div>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div id="appRoot" style="display: none;"></div>

  <script>
    // ========== GLOBAL STATE & STORAGE ==========
    const STORAGE_KEY = 'MUHAMMED_PORTFOLIO_DB';
    
    // Default credentials (hidden from users)
    const DEFAULT_ADMIN = {
      username: 'admin',
      password: 'admin123',
      role: 'admin'
    };

    const DEFAULT_PUBLIC = {
      username: 'public',
      password: 'public123',
      role: 'user'
    };

    function getDefaultData() {
      return {
        users: [
          { ...DEFAULT_ADMIN },
          { ...DEFAULT_PUBLIC }
        ],
        profile: {
          name: 'Muhammed PP',
          title: 'Full Stack Developer & AI Enthusiast',
          bio: 'Building futuristic digital experiences with code, creativity, and neon dreams. Passionate about creating innovative solutions.',
          avatar: '',
          location: 'Kerala, India',
          email: 'muhammed@example.com'
        },
        skills: ['JavaScript', 'React', 'Node.js', 'Python', 'AI/ML', 'Cloud Computing', 'Docker', 'TypeScript'],
        projects: [
          {
            id: 'sample1',
            title: 'Portfolio Website',
            description: 'A futuristic portfolio platform with glassmorphism design and neon effects.',
            technologies: 'HTML, CSS, JavaScript',
            githubLink: 'https://github.com',
            demoLink: 'https://demo.com'
          }
        ],
        achievements: [
          {
            id: 'ach1',
            title: 'Best Developer Award 2024',
            description: 'Recognized for outstanding contributions to web development.',
            date: '2024-06-15'
          }
        ],
        events: [
          {
            id: 'evt1',
            name: 'Tech Conference 2024',
            date: '2024-09-20',
            venue: 'Kochi, Kerala',
            description: 'Annual technology conference featuring workshops and networking.'
          }
        ],
        gallery: [],
        videos: [],
        files: [],
        messages: [],
        comments: [],
        followers: [],
        ratings: [],
        visits: 0,
      };
    }

    function loadData() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const data = JSON.parse(stored);
          // Ensure both default users always exist
          if (!data.users) data.users = [];
          if (!data.users.some(u => u.username === 'admin')) {
            data.users.push({ ...DEFAULT_ADMIN });
          }
          if (!data.users.some(u => u.username === 'public')) {
            data.users.push({ ...DEFAULT_PUBLIC });
          }
          return data;
        }
      } catch (e) {
        console.error('Error loading data:', e);
      }
      return getDefaultData();
    }

    function saveData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        console.log('Data saved successfully');
      } catch (e) {
        console.error('Error saving data:', e);
        alert('Error saving data. Storage might be full.');
      }
    }

    // Initialize data
    let APP_DATA = loadData();
    
    // Double-check both default users exist
    if (!APP_DATA.users.some(u => u.username === 'admin')) {
      APP_DATA.users.push({ ...DEFAULT_ADMIN });
    }
    if (!APP_DATA.users.some(u => u.username === 'public')) {
      APP_DATA.users.push({ ...DEFAULT_PUBLIC });
    }
    
    saveData(APP_DATA);
    console.log('Platform initialized successfully');

    let currentUser = null;

    // ========== UTILS ==========
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    }

    function avgRating() {
      if(!APP_DATA.ratings || !APP_DATA.ratings.length) return '0.0';
      return (APP_DATA.ratings.reduce((a,b) => a + b.stars, 0) / APP_DATA.ratings.length).toFixed(1);
    }

    // ========== CUSTOM CURSOR ==========
    const cursor = document.getElementById('cursor');
    const cursorGlow = document.getElementById('cursorGlow');
    let trailElements = [];
    const maxTrails = 12;
    
    document.addEventListener('mousemove', (e) => {
      if (!cursor || !cursorGlow) return;
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      cursorGlow.style.left = e.clientX + 'px';
      cursorGlow.style.top = e.clientY + 'px';
      
      const trail = document.createElement('div');
      trail.className = 'trail';
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';
      document.body.appendChild(trail);
      trailElements.push(trail);
      
      if (trailElements.length > maxTrails) {
        const old = trailElements.shift();
        if(old) old.remove();
      }
      setTimeout(() => {
        if(trail) trail.style.opacity = '0';
        setTimeout(() => { if(trail) trail.remove(); }, 300);
      }, 200);
    });

    document.addEventListener('mouseover', (e) => {
      if (!cursor) return;
      if (e.target.tagName === 'BUTTON' || e.target.classList.contains('btn') || e.target.tagName === 'A' || e.target.classList.contains('glass-card')) {
        cursor.style.transform = 'scale(2.2)';
        cursor.style.background = '#a259ff';
      }
    });
    
    document.addEventListener('mouseout', () => {
      if (!cursor) return;
      cursor.style.transform = 'scale(1)';
      cursor.style.background = 'rgba(0,255,255,0.6)';
    });

    // ========== RENDER ENGINE ==========
    const appRoot = document.getElementById('appRoot');

    function navigateTo(page) {
      window.location.hash = page;
      renderApp(page);
    }

    function renderApp(page) {
      if (!currentUser) {
        renderLogin();
        return;
      }

      switch(page) {
        case 'admin': renderAdminDashboard(); break;
        case 'public': renderPublicView(); break;
        case 'login': renderLogin(); break;
        default: 
          if (currentUser.role === 'admin') renderAdminDashboard();
          else renderPublicView();
      }
    }

    // ========== AUTH ==========
    function login(username, password) {
      console.log('Login attempt:', username);
      
      // Refresh data before login attempt
      APP_DATA = loadData();
      
      const user = APP_DATA.users.find(u => u.username === username && u.password === password);
      
      if (user) {
        currentUser = { username: user.username, role: user.role };
        APP_DATA.visits = (APP_DATA.visits || 0) + 1;
        saveData(APP_DATA);
        console.log('Login successful');
        
        if (user.role === 'admin') {
          navigateTo('admin');
        } else {
          navigateTo('public');
        }
        return true;
      } else {
        return false;
      }
    }

    function register(username, password) {
      // Validate inputs
      if (!username || !password) {
        return { success: false, message: '⚠️ Please fill all fields' };
      }
      
      if (username.length < 3) {
        return { success: false, message: '⚠️ Username must be at least 3 characters' };
      }
      
      if (password.length < 6) {
        return { success: false, message: '⚠️ Password must be at least 6 characters' };
      }
      
      // Check if username already exists
      if (APP_DATA.users.find(u => u.username === username)) {
        return { success: false, message: '❌ Username already exists! Please choose another.' };
      }
      
      // Create new user
      APP_DATA.users.push({
        username: username,
        password: password,
        role: 'user'
      });
      
      saveData(APP_DATA);
      return { success: true, message: '✅ Registration successful! You can now login.' };
    }

    function logout() {
      currentUser = null;
      navigateTo('login');
    }

    function renderLogin() {
      appRoot.innerHTML = `
        <div class="container" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
          <div class="glass" style="padding:2.5rem; max-width:450px; width:100%; text-align:center;">
            <div style="margin-bottom:1.5rem;">
              <h2 class="login-title" style="background: linear-gradient(135deg, cyan, #a259ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Muhammed
              </h2>
              <h2 class="login-title" style="background: linear-gradient(135deg, #a259ff, cyan); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                PP
              </h2>
            </div>
            <p class="login-subtitle">⚡ Portfolio Platform</p>
            
            <div id="messageBox"></div>
            
            <!-- Login Form -->
            <div id="loginForm">
              <div style="margin:1.5rem 0;">
                <input type="text" id="loginUsername" placeholder="Username" style="width:100%; margin-bottom:0.8rem;"><br>
                <input type="password" id="loginPassword" placeholder="Password" style="width:100%; margin-bottom:1.2rem;"><br>
                <button id="loginBtn" style="width:100%;">🚀 Login</button>
              </div>
              
              <p class="toggle-link" id="showRegister">📝 Don't have an account? Register here</p>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" style="display:none;">
              <div style="margin:1.5rem 0;">
                <input type="text" id="regUsername" placeholder="Choose Username (min 3 chars)" style="width:100%; margin-bottom:0.8rem;"><br>
                <input type="password" id="regPassword" placeholder="Choose Password (min 6 chars)" style="width:100%; margin-bottom:0.8rem;"><br>
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" style="width:100%; margin-bottom:1.2rem;"><br>
                <button id="registerBtn" style="width:100%;">✨ Create Account</button>
              </div>
              
              <p class="toggle-link" id="showLogin">🔙 Already have an account? Login here</p>
            </div>
            
            <p style="color: #666; font-size: 0.8rem; margin-top: 1rem;">
              Secure authentication required
            </p>
          </div>
        </div>
      `;
      
      // Toggle between login and register forms
      document.getElementById('showRegister').addEventListener('click', () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('messageBox').innerHTML = '';
      });
      
      document.getElementById('showLogin').addEventListener('click', () => {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('messageBox').innerHTML = '';
      });
      
      // Login handler
      document.getElementById('loginBtn').addEventListener('click', () => {
        const u = document.getElementById('loginUsername').value.trim();
        const p = document.getElementById('loginPassword').value.trim();
        
        if (!u || !p) {
          document.getElementById('messageBox').innerHTML = '<div class="error-message">⚠️ Please enter both username and password</div>';
          return;
        }
        
        const success = login(u, p);
        if (!success) {
          document.getElementById('messageBox').innerHTML = '<div class="error-message">❌ Invalid credentials! Please try again.</div>';
        }
      });
      
      // Register handler
      document.getElementById('registerBtn').addEventListener('click', () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirmPassword = document.getElementById('regConfirmPassword').value.trim();
        
        // Check passwords match
        if (password !== confirmPassword) {
          document.getElementById('messageBox').innerHTML = '<div class="error-message">❌ Passwords do not match!</div>';
          return;
        }
        
        const result = register(username, password);
        
        if (result.success) {
          document.getElementById('messageBox').innerHTML = `<div class="success-message">${result.message}</div>`;
          // Clear registration fields
          document.getElementById('regUsername').value = '';
          document.getElementById('regPassword').value = '';
          document.getElementById('regConfirmPassword').value = '';
          // Switch to login form after 2 seconds
          setTimeout(() => {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('messageBox').innerHTML = '<div class="success-message">✅ Registration successful! Please login.</div>';
          }, 2000);
        } else {
          document.getElementById('messageBox').innerHTML = `<div class="error-message">${result.message}</div>`;
        }
      });
      
      // Allow Enter key for login
      document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('loginBtn').click();
        }
      });
      
      // Allow Enter key for register
      document.getElementById('regConfirmPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('registerBtn').click();
        }
      });
    }

    // ========== ADMIN DASHBOARD ==========
    function renderAdminDashboard() {
      const unread = APP_DATA.messages ? APP_DATA.messages.filter(m => !m.read).length : 0;
      appRoot.innerHTML = `
        <div class="container fade-in">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
            <h1 style="font-size:2rem;">⚙️ ADMIN DASHBOARD</h1>
            <div>
              <button onclick="navigateTo('public')" style="margin-right:0.5rem;">👁️ View Public</button>
              <button onclick="logout()">🚪 Logout (${currentUser.username})</button>
            </div>
          </div>
          <div class="grid grid-4" style="margin:2rem 0;">
            <div class="glass" style="padding:1.5rem; text-align:center;"><h3>👥 Users</h3><p style="font-size:2rem;">${APP_DATA.users.length}</p></div>
            <div class="glass" style="padding:1.5rem; text-align:center;"><h3>📨 Messages</h3><p style="font-size:2rem;">${APP_DATA.messages.length} <small>(unread ${unread})</small></p></div>
            <div class="glass" style="padding:1.5rem; text-align:center;"><h3>⭐ Rating</h3><p style="font-size:2rem;">${avgRating()}</p><small>${APP_DATA.ratings.length} ratings</small></div>
            <div class="glass" style="padding:1.5rem; text-align:center;"><h3>👣 Followers</h3><p style="font-size:2rem;">${APP_DATA.followers.length}</p></div>
          </div>
          ${renderAdminTabs()}
        </div>
      `;
      attachAdminEvents();
    }

    function renderAdminTabs() {
      return `
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin:1.5rem 0;">
          <button class="admin-tab active" data-tab="users">👤 Users</button>
          <button class="admin-tab" data-tab="profile">📝 Profile</button>
          <button class="admin-tab" data-tab="skills">⚡ Skills</button>
          <button class="admin-tab" data-tab="projects">📁 Projects</button>
          <button class="admin-tab" data-tab="achievements">🏆 Achievements</button>
          <button class="admin-tab" data-tab="events">📅 Events</button>
          <button class="admin-tab" data-tab="gallery">🖼️ Gallery</button>
          <button class="admin-tab" data-tab="videos">🎥 Videos</button>
          <button class="admin-tab" data-tab="files">📂 Files</button>
          <button class="admin-tab" data-tab="messages">✉️ Messages</button>
          <button class="admin-tab" data-tab="comments">💬 Comments</button>
        </div>
        <div id="adminTabContent" class="glass" style="padding:2rem;"></div>
      `;
    }

    function attachAdminEvents() {
      document.querySelectorAll('.admin-tab').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const tab = this.dataset.tab;
          document.getElementById('adminTabContent').innerHTML = getAdminTabHTML(tab);
          attachTabSpecificEvents(tab);
        });
      });
      const activeTab = document.querySelector('.admin-tab.active');
      if(activeTab) activeTab.click();
    }

    function getAdminTabHTML(tab) {
      switch(tab) {
        case 'users': return renderUsersManager();
        case 'profile': return renderProfileEditor();
        case 'skills': return renderSkillsEditor();
        case 'projects': return renderProjectsManager();
        case 'achievements': return renderAchievementsManager();
        case 'events': return renderEventsManager();
        case 'gallery': return renderGalleryManager();
        case 'videos': return renderVideoManager();
        case 'files': return renderFileManager();
        case 'messages': return renderMessagesView();
        case 'comments': return renderCommentsManager();
        default: return '';
      }
    }

    function renderUsersManager() {
      let html = `<h3>User Management</h3>
        <div style="margin:1rem 0; display:flex; gap:0.5rem; flex-wrap:wrap;">
          <input id="newUsername" placeholder="Username" style="flex:1; min-width:150px;">
          <input id="newPassword" placeholder="Password" type="password" style="flex:1; min-width:150px;">
          <button id="createUserBtn">➕ Create User</button>
        </div>
        <div class="grid" style="grid-template-columns:1fr;">`;
      APP_DATA.users.forEach(u => {
        html += `<div class="glass-card" style="padding:1rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
          <span><strong>${u.username}</strong> <span class="badge">${u.role}</span></span>
          <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            ${u.username !== 'admin' && u.username !== 'public' ? `<button onclick="changeRole('${u.username}')">🔄 Toggle Role</button>` : ''}
            <button onclick="resetUserPassword('${u.username}')">🔑 Reset PW</button>

      if (user && username !== 'admin' && username !== 'public') {
        user.role = user.role === 'admin' ? 'user' : 'admin';
        saveData(APP_DATA);
        navigateTo('admin');
      }
    };
    
    window.resetUserPassword = (username) => {
      const newPw = prompt('New password for ' + username + ':');
      if (newPw && newPw.trim()) {
        const user = APP_DATA.users.find(u => u.username === username);
        if (user) { 
          user.password = newPw.trim(); 
          saveData(APP_DATA); 
          alert('✅ Password reset successfully!'); 
          navigateTo('admin'); 
        }
      }
    };
    
    window.deleteUser = (username) => {
      if (username === 'admin' || username === 'public') return;
      if(confirm('Delete user ' + username + '?')) {
        APP_DATA.users = APP_DATA.users.filter(u => u.username !== username);
        saveData(APP_DATA); 
        navigateTo('admin');

              alert('❌ Username already exists!');
              return;

            APP_DATA.users.push({username: uname, password: pw, role: 'user'});
            saveData(APP_DATA);
            alert('✅ User created successfully!');
            navigateTo('admin');
          } else {
            alert('⚠️ Please fill all fields');

        });

      if(tab === 'profile') {

          navigateTo('admin');
        });

      if(tab === 'skills') {

          APP_DATA.skills = document.getElementById('skillsText').value.split(',').map(s => s.trim()).filter(s => s);
          saveData(APP_DATA);
          alert('✅ Skills saved!');
          navigateTo('admin');

          APP_DATA.events.push({

      if(tab === 'gallery') {
        document.getElementById('galleryUpload')?.addEventListener('change', function(e) {
          Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
              APP_DATA.gallery.push(ev.target.result);
              saveData(APP_DATA);
              navigateTo('admin');

            reader.readAsDataURL(file);
          });
        });

      if(tab === 'videos') {
        document.getElementById('videoUpload')?.addEventListener('change', function(e) {
          Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
              APP_DATA.videos.push(ev.target.result);
              saveData(APP_DATA);
              navigateTo('admin');
            };
            reader.readAsDataURL(file);
          });
        });
      }
      if(tab === 'files') {
        document.getElementById('fileUpload')?.addEventListener('change', function(e) {
          Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
              APP_DATA.files.push({
                id: generateId(),
                name: file.name,
                type: file.type,
                data: ev.target.result
              });
              saveData(APP_DATA);
              navigateTo('admin');
            };
            reader.readAsDataURL(file);
          });
        });
      }
    }

        if (hash === 'admin' && currentUser?.role === 'admin') {
          renderAdminDashboard();
        } else if (hash === 'public' && currentUser) {
          renderPublicView();
        } else {
          renderLogin();
        }
      }, 1000);
    };

    window.addEventListener('hashchange', () => {
      if(currentUser) {
        const hash = window.location.hash.substring(1);
        if(hash === 'admin' && currentUser.role === 'admin') renderAdminDashboard();
        else if(hash === 'public') renderPublicView();
      }
    });

    console.log('✅ Platform Ready');
  </script>
</body>
</html>
